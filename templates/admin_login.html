{% extends 'base.html' %}
{% block title %}Admin — Birka{% endblock %}

<div class="container-sm">
  <div class="card">
    <h1 style="font-size:1.3rem;margin-bottom:1.25rem;">Admin access</h1>

</div>
{% endblock %}
