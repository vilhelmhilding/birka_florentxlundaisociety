<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Birka{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
  <a class="brand" href="/">Birka</a>
  <div class="links">
    {% if user %}
      <span class="muted">{{ user.name }}</span>
      {% if user.role == 'seller' %}
        <a href="{{ url_for('seller_setup') }}">Edit Profile</a>
      {% endif %}
      <a href="{{ url_for('logout') }}">Sign out</a>
    {% else %}
      <a href="{{ url_for('login') }}">Sign in</a>
      <a href="{{ url_for('register') }}" class="btn btn-primary btn-sm">Get started</a>
    {% endif %}
  </div>
</nav>

{% with msgs = get_flashed_messages() %}
  {% if msgs %}
    <div style="padding: .6rem 1.5rem;">
      {% for m in msgs %}<div class="alert alert-error">{{ m }}</div>{% endfor %}
    </div>
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}
</body>
</html>
