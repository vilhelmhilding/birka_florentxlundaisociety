{% extends 'base.html' %}
{% block title %}Sign in — Birka{% endblock %}
{% block content %}
<div class="auth-wrap">
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your account.</p>

  <form method="POST" class="card">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required autofocus placeholder="jane@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required placeholder="Your password">
    </div>
    <button type="submit" class="btn btn-primary btn-full">Sign in</button>
  </form>

  <p style="margin-top:18px;font-size:.875rem;color:var(--muted);text-align:center;">
    No account yet? <a href="{{ url_for('register') }}">Create one</a>
  </p>
</div>
{% endblock %}
