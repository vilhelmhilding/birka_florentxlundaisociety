{% extends 'base.html' %}
{% block title %}Sign in — Birka{% endblock %}
{% block content %}
<div class="container-sm">
  <div class="card">
    <h1 style="font-size:1.4rem;margin-bottom:.25rem;">Sign in</h1>
    <p class="muted" style="margin-bottom:1.5rem;">New here? <a href="{{ url_for('register') }}" style="color:var(--accent);">Create an account</a></p>
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
