{% extends 'base.html' %}
{% block title %}Create account — Birka{% endblock %}
{% block content %}
<div class="container-sm">
  <div class="card">
    <h1 style="font-size:1.4rem;margin-bottom:.25rem;">Create your account</h1>
    <p class="muted" style="margin-bottom:1.5rem;">Already have one? <a href="{{ url_for('login') }}" style="color:var(--accent);">Sign in</a></p>

    <form method="POST">
      <div class="form-group">
        <label>Full name</label>
        <input type="text" name="name" required placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="jane@example.com">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" name="phone" placeholder="+46 70 000 0000">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required minlength="6">
      </div>
      <div class="form-group">
        <label>I am a…</label>
        <div class="role-pick">
          <input type="radio" name="role" id="r-buyer" value="buyer" checked>
          <label for="r-buyer">Buyer — looking for services</label>
          <input type="radio" name="role" id="r-seller" value="seller">
          <label for="r-seller">Seller — offering services</label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;">Create account</button>
    </form>
  </div>
</div>
{% endblock %}
